<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #b00808;
        }
        h3{
            color: rgb(0, 255, 38);
        }
        .my-btn{
            background-color: rgb(255, 247, 0); 
            color: white;
            padding:10px;
            border:none;
            border-radius: 5px;
            cursor: pointer;
        }
        button{
            color:rgb(0, 255, 47);
            background-color: #b00808;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
    
    <h3>My Favorite Colors</h3>
    <ul>
        <li>Blue</li>
        <li>Black</li>
        <li>White</li>
    </ul>

    
    <button type="button">Submit</button>

    <br><br>

   
    <a href="https://www.google.com" target="_blank">Go to Google</a>

    <br><br>

   <h3>Registration Form</h3>
    
    <form>
        <label>Username: </label>
        <input type="text" placeholder="Enter your username">
        <br><br>

        <label>Password: </label>
        <input type="password" placeholder="Enter secret password">
        <br><br>

        <label>Country: </label>
        <select>
            <option>Bangladesh</option>
            <option>India</option>
            <option>USA</option>
            <option>Canada</option>
        </select>
        <br><br>

        
        <button type="submit" class="my-btn">Complete Registration</button>
        
    </form>
    <h3>Random Online Image</h3>
    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=400&auto=format&fit=crop" alt="A laptop on a desk showing web development code" width="300">

    <br><br><hr><br>
    
</body>
</html>
