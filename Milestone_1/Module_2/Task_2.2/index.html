<!DOCTYPE html>
<html>
<head>
    <title>Advanced CSS Practice</title>
    
    <style>
       .hide-btn{
        display:none;
       } 
       body{
        background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1600&auto=format&fit=crop');
background-size: cover;
color:white;
       }
       
        span{
            display: inline-block;
            padding: 5px;
            color:black;
            background-color: #ffdd59;
            border-radius: 4px;


        }
       

    </style>
</head>
<body>

    <h2>HTML Basics Practice</h2>
    
    <p>This is a normal paragraph, but here is a <span>Special Word</span>. Below this, we are adding our new elements!</p>
    
    <hr>

    <h3>My Favorite Colors</h3>
    <ul>
        <li>Blue</li>
        <li>Black</li>
        <li>White</li>
    </ul>

  
    <button type ="Button" class="hide-btn">submit</button>
    
    <br><br>

   
    <a href="https://www.google.com" target="_blank" style="color: #ffdd59;">Go to Google</a>
    
    <br><br>

    <h3>Random Online Image</h3>

    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=400&auto=format&fit=crop" alt="A laptop on a desk showing web development code" width="300" style="border-radius: 10px;">

    <hr>

    
    <form>
        <h3 style="text-align: center; margin-top: 0;">Create Account</h3>
        
        <label>Username: </label>
        <input type="text" placeholder="Enter your username">

        <label>Password: </label>
        <input type="password" placeholder="Enter secret password">

        <label>Country: </label>
        <select>
            <option>Bangladesh</option>
            <option>India</option>
            <option>USA</option>
            <option>Canada</option>
        </select>

        <button type="submit" class="my-btn">Complete Registration</button>
    </form>

</body>
</html>
